services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-paic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-paic}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paic} -d ${POSTGRES_DB:-paic}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  paic:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PAIC_DATABASE_URL: ${PAIC_DATABASE_URL:-postgresql+psycopg://paic:${POSTGRES_PASSWORD}@postgres:5432/paic}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
